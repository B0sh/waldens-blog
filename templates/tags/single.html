{% extends "index.html" %}

{% block title %}Posts tagged "{{ term.name }}" &mdash; {{ config.title }}{% endblock title %}

{% block content %}
<h1>#{{ term.name }}</h1>

<ul class="homepage-list">
{% for post in term.pages %}
    {{ macros::post_in_list(post=post) }}
{% endfor %}
</ul>

<p><a href="{{ get_url(path="tags") }}">&larr; All tags</a></p>
{% endblock content %}
